; PlatformIO project configuration — SmartSentry ESP32-CAM
; Docs: https://docs.platformio.org/en/latest/projectconf/index.html

[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

; Serial monitor
monitor_speed  = 115200
upload_speed   = 921600

; Libraries
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^6.21.0

; Build flags — increase MQTT buffer for JPEG payloads
build_flags =
    -DMQTT_MAX_PACKET_SIZE=40000
    -DCORE_DEBUG_LEVEL=1
